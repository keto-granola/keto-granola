services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: keto_granola_ci
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci"]
      interval: 5s
      timeout: 3s
      retries: 5

  keto-granola-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: postgres://ci:ci@postgres:5432/keto-granola-ci?sslmode=disable
      SERVER_PORT: 3001
      LOG_LEVEL: info
      ENVIRONMENT: development
      CLIENT_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s